name: 🏗️ EPC AutoAppelOffre - Daily Run

on:
  schedule:
    # Exécution chaque jour à 8h (UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Installe les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🚀 Lance le pipeline
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
        run: python main.py --lookback 7
      
      - name: 📋 Affiche les logs (en cas d'erreur)
        if: failure()
        run: tail -50 app.log
      
      - name: 📤 Upload des logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-logs
          path: app.log
          retention-days: 30
